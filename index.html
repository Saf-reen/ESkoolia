    #splash-screen {
      position: fixed;

      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.6s ease-out;

    .splash-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(88, 28, 135, 0.1);

      border-radius: 50%;

    }

        transform: rotate(360deg);
      }
    }

    .splash-brand {

      color: #581C87;

      font-size: 14px;
      color: #71717a;
      margin-top: 8px;
